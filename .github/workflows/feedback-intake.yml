# 放到「公共 relay 仓」的 .github/workflows/feedback-intake.yml
#
# 模型（ADR-104 支柱③ · GitHub Actions 中转）：
#   用户客户端用「自己的 PAT」在这个**公共** relay 仓建加密 issue（任何登录用户都能建，无共享密钥）。
#   本 Action 在 issue 建立时触发：搬运到**私有** intake 仓、贴标签、然后**关闭公共 issue**——
#   公共仓只当一个「投递口」，不留内容、把被爆破/刷屏的面降到最低；真正的意见沉淀在私有仓，维护 agent 读私有仓。
#
# 需要在 relay 仓 Settings → Secrets → Actions 配一个：
#   INTAKE_PAT —— 一个**细粒度 PAT**，仅对私有 intake 仓有 issues:write（绝不下发到客户端，只存在 Actions secret 里）。
# 变量（Settings → Variables）：
#   INTAKE_REPO —— 私有 intake 仓，形如 owner/operra-intake

name: feedback-intake
on:
  issues:
    types: [opened]

permissions:
  issues: write            # 关闭公共 issue 用

jobs:
  relay:
    runs-on: ubuntu-latest
    # 普通 public 用户通常无权给 issue 打 label，不能以 label 作为中转门槛。
    # 客户端公开标题固定且不含反馈内容；其它人工/垃圾 issue 不触发解密 Action。
    if: startsWith(github.event.issue.title, 'Encrypted Operra feedback ·')
    steps:
      - name: Mirror to private intake repo
        env:
          GH_TOKEN: ${{ secrets.INTAKE_PAT }}
          INTAKE_REPO: ${{ vars.INTAKE_REPO }}
          ENVELOPE: ${{ github.event.issue.body }}
          FEEDBACK_DECRYPT_KEY: ${{ secrets.FEEDBACK_DECRYPT_KEY }}
        run: |
          set -euo pipefail
          # 公共 issue 从始至终只有 RSA-OAEP 密文。私钥仅存在 Actions secret。
          python - <<'PY'
          import base64, json, os, re, subprocess, tempfile
          envelope = json.loads(os.environ.get("ENVELOPE", ""))
          if envelope.get("version") != 1 or envelope.get("algorithm") != "RSA-OAEP-256-chunked":
              raise SystemExit("unsupported feedback envelope")
          key = os.environ.get("FEEDBACK_DECRYPT_KEY", "")
          if "PRIVATE KEY" not in key:
              raise SystemExit("missing feedback decrypt key")
          with tempfile.NamedTemporaryFile("w", delete=False, encoding="utf-8") as fh:
              fh.write(key)
              key_path = fh.name
          os.chmod(key_path, 0o600)
          raw = bytearray()
          try:
              for encoded in envelope.get("chunks") or []:
                  cipher = base64.urlsafe_b64decode(encoded + "=" * (-len(encoded) % 4))
                  part = subprocess.run([
                      "openssl", "pkeyutl", "-decrypt", "-inkey", key_path,
                      "-pkeyopt", "rsa_padding_mode:oaep", "-pkeyopt", "rsa_oaep_md:sha256",
                      "-pkeyopt", "rsa_mgf1_md:sha256",
                  ], input=cipher, capture_output=True, check=True).stdout
                  raw.extend(part)
          finally:
              os.unlink(key_path)
          payload = json.loads(raw.decode("utf-8"))
          title = str(payload.get("title") or "Operra feedback")[:200]
          body = str(payload.get("body") or "")[:65536]
          patterns = [
              (r'(?i)(authorization\s*[:=]\s*(?:bearer\s+)?)[^\s]+', r'\1[REDACTED]'),
              (r'(?i)((?:token|pat|api[_ -]?key|secret)\s*[:=]\s*)[^\s]+', r'\1[REDACTED]'),
              (r'\b(?:ghp|github_pat)_[A-Za-z0-9_]{20,}\b', '[REDACTED_GITHUB_TOKEN]'),
          ]
          for pattern, replacement in patterns:
              body = re.sub(pattern, replacement, body)
          labels = [x for x in payload.get("labels") or [] if x in ("fb:bug", "fb:idea", "fb:annoyance")]
          with open("title.txt", "w", encoding="utf-8") as fh:
              fh.write(title)
          with open("body.txt", "w", encoding="utf-8") as fh:
              fh.write(body)
          with open("labels.txt", "w", encoding="utf-8") as fh:
              fh.write(",".join(labels))
          PY
          TITLE="$(cat title.txt)"
          LABELS="$(cat labels.txt)"
          if [ -n "$LABELS" ]; then
            gh issue create --repo "$INTAKE_REPO" --title "$TITLE" --body-file body.txt --label "$LABELS"
          else
            gh issue create --repo "$INTAKE_REPO" --title "$TITLE" --body-file body.txt
          fi
      - name: Redact and close public issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # close 不会隐藏正文；必须先覆写公开标题/正文，避免反馈与日志永久公开。
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --title "Feedback received" \
            --body "Feedback was relayed to the private intake and redacted from this public entry."
          gh issue close "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --comment "已收到，谢谢反馈 🙏" || true
